name: Tail Logs

on:
  workflow_dispatch:
    inputs:
      minutes:
        description: 'Minutes of logs to fetch'
        required: false
        default: '10'

jobs:
  logs:
    runs-on: ubuntu-latest
    environment: production

    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ vars.AWS_REGION }}

      - name: Get Lambda function name
        id: fn
        run: |
          FN=$(aws cloudformation describe-stacks --stack-name telegram-summary-bot \
            --query 'Stacks[0].Outputs[?OutputKey==`FunctionName`].OutputValue' --output text)
          echo "name=$FN" >> "$GITHUB_OUTPUT"

      - name: Tail recent logs
        run: |
          MINUTES=${{ inputs.minutes || '10' }}
          MS=$(( MINUTES * 60 * 1000 ))
          echo "Fetching last ${MINUTES} minutes of logs for ${{ steps.fn.outputs.name }}..."
          echo "---"
          aws logs filter-log-events \
            --log-group-name "/aws/lambda/${{ steps.fn.outputs.name }}" \
            --start-time $(( $(date +%s) * 1000 - MS )) \
            --interleaved \
            --query 'events[*].message' \
            --output text | tail -300
