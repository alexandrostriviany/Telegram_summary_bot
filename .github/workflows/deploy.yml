name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  ci:
    uses: ./.github/workflows/ci.yml

  deploy:
    needs: ci
    runs-on: ubuntu-latest
    environment: production

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Setup AWS SAM CLI
        uses: aws-actions/setup-sam@v2

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ vars.AWS_REGION }}

      - name: Install dependencies
        run: npm ci

      - name: Build production bundle
        run: npm run bundle:prod

      - name: SAM build
        run: sam build

      - name: SAM deploy
        id: sam-deploy
        run: |
          PARAMS="TelegramBotToken=${{ secrets.TELEGRAM_BOT_TOKEN }}"
          PARAMS="$PARAMS LLMProvider=${{ vars.LLM_PROVIDER || 'gemini' }}"
          PARAMS="$PARAMS AdminUserId=${{ secrets.ADMIN_USER_ID || '0' }}"

          if [ -n "${{ secrets.OPENAI_API_KEY }}" ]; then
            PARAMS="$PARAMS OpenAIApiKey=${{ secrets.OPENAI_API_KEY }}"
          fi
          if [ -n "${{ secrets.GEMINI_API_KEY }}" ]; then
            PARAMS="$PARAMS GeminiApiKey=${{ secrets.GEMINI_API_KEY }}"
          fi
          if [ -n "${{ secrets.GROK_API_KEY }}" ]; then
            PARAMS="$PARAMS GrokApiKey=${{ secrets.GROK_API_KEY }}"
          fi
          if [ -n "${{ vars.LLM_MODEL }}" ]; then
            PARAMS="$PARAMS LLMModel=${{ vars.LLM_MODEL }}"
          fi
          if [ -n "${{ vars.LLM_PROVIDER_FALLBACK }}" ]; then
            PARAMS="$PARAMS LLMProviderFallback=${{ vars.LLM_PROVIDER_FALLBACK }}"
          fi

          sam deploy \
            --stack-name telegram-summary-bot \
            --resolve-s3 \
            --s3-prefix telegram-summary-bot \
            --region ${{ vars.AWS_REGION }} \
            --capabilities CAPABILITY_IAM \
            --no-confirm-changeset \
            --no-fail-on-empty-changeset \
            --parameter-overrides $PARAMS

      - name: Get stack outputs
        id: get-outputs
        run: |
          STACK_NAME="telegram-summary-bot"
          echo "stack_name=$STACK_NAME" >> "$GITHUB_OUTPUT"

          OUTPUTS=$(aws cloudformation describe-stacks \
            --stack-name "$STACK_NAME" \
            --query 'Stacks[0].Outputs' \
            --output json)

          WEBHOOK_URL=$(echo "$OUTPUTS" | jq -r '.[] | select(.OutputKey=="WebhookUrl") | .OutputValue')
          FUNCTION_NAME=$(echo "$OUTPUTS" | jq -r '.[] | select(.OutputKey=="FunctionName") | .OutputValue')
          API_ENDPOINT=$(echo "$OUTPUTS" | jq -r '.[] | select(.OutputKey=="ApiEndpoint") | .OutputValue')
          MESSAGES_TABLE=$(echo "$OUTPUTS" | jq -r '.[] | select(.OutputKey=="MessagesTableName") | .OutputValue')
          CREDITS_TABLE=$(echo "$OUTPUTS" | jq -r '.[] | select(.OutputKey=="UserCreditsTableName") | .OutputValue')
          OWNERSHIP_TABLE=$(echo "$OUTPUTS" | jq -r '.[] | select(.OutputKey=="ChatOwnershipTableName") | .OutputValue')
          SUMMARY_CACHE_TABLE=$(echo "$OUTPUTS" | jq -r '.[] | select(.OutputKey=="SummaryCacheTableName") | .OutputValue // empty')

          # Extract HttpApiId from the API endpoint URL
          HTTP_API_ID=$(echo "$API_ENDPOINT" | sed 's|https://||' | cut -d. -f1)

          echo "webhook_url=$WEBHOOK_URL" >> "$GITHUB_OUTPUT"
          echo "function_name=$FUNCTION_NAME" >> "$GITHUB_OUTPUT"
          echo "http_api_id=$HTTP_API_ID" >> "$GITHUB_OUTPUT"
          echo "messages_table=$MESSAGES_TABLE" >> "$GITHUB_OUTPUT"
          echo "credits_table=$CREDITS_TABLE" >> "$GITHUB_OUTPUT"
          echo "ownership_table=$OWNERSHIP_TABLE" >> "$GITHUB_OUTPUT"
          echo "summary_cache_table=$SUMMARY_CACHE_TABLE" >> "$GITHUB_OUTPUT"

      - name: Register Telegram webhook
        run: |
          RESPONSE=$(curl -sf "https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/setWebhook?url=${{ steps.get-outputs.outputs.webhook_url }}")
          echo "$RESPONSE"
          echo "$RESPONSE" | grep -q '"ok":true' || exit 1

      - name: Verify webhook registration
        run: |
          RESPONSE=$(curl -sf "https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/getWebhookInfo")
          echo "$RESPONSE"
          echo "$RESPONSE" | grep -q '"url":"${{ steps.get-outputs.outputs.webhook_url }}"' || echo "Warning: webhook URL mismatch"

      - name: Deploy monitoring stack
        run: |
          MON_PARAMS="LambdaFunctionName=${{ steps.get-outputs.outputs.function_name }}"
          MON_PARAMS="$MON_PARAMS HttpApiId=${{ steps.get-outputs.outputs.http_api_id }}"
          MON_PARAMS="$MON_PARAMS DynamoDBTableName=${{ steps.get-outputs.outputs.messages_table }}"
          MON_PARAMS="$MON_PARAMS UserCreditsTableName=${{ steps.get-outputs.outputs.credits_table }}"
          MON_PARAMS="$MON_PARAMS ChatOwnershipTableName=${{ steps.get-outputs.outputs.ownership_table }}"

          if [ -n "${{ secrets.ADMIN_EMAIL }}" ]; then
            MON_PARAMS="$MON_PARAMS AdminEmail=${{ secrets.ADMIN_EMAIL }}"
          fi

          if [ -n "${{ steps.get-outputs.outputs.summary_cache_table }}" ]; then
            MON_PARAMS="$MON_PARAMS SummaryCacheTableName=${{ steps.get-outputs.outputs.summary_cache_table }}"
          fi

          # Use SAM-managed S3 bucket for template upload (required when template > 51,200 bytes)
          SAM_BUCKET=$(aws cloudformation describe-stacks \
            --stack-name aws-sam-cli-managed-default \
            --query 'Stacks[0].Outputs[?OutputKey==`SourceBucket`].OutputValue' \
            --output text 2>/dev/null || echo "")

          DEPLOY_ARGS="--template-file monitoring/cloudwatch-monitoring.yaml"
          DEPLOY_ARGS="$DEPLOY_ARGS --stack-name ${{ steps.get-outputs.outputs.stack_name }}-monitoring"
          DEPLOY_ARGS="$DEPLOY_ARGS --no-fail-on-empty-changeset"
          DEPLOY_ARGS="$DEPLOY_ARGS --parameter-overrides $MON_PARAMS"

          if [ -n "$SAM_BUCKET" ]; then
            DEPLOY_ARGS="$DEPLOY_ARGS --s3-bucket $SAM_BUCKET --s3-prefix telegram-summary-bot-monitoring"
          fi

          aws cloudformation deploy $DEPLOY_ARGS
