AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31
Description: >
  Telegram AI Summary Bot
  
  A serverless application that helps users catch up on missed group chat 
  discussions through AI-powered summaries. Uses AWS Lambda, DynamoDB, and 
  supports pluggable AI providers (Google Gemini, OpenAI, or AWS Bedrock/Claude).

# Global settings applied to all functions
Globals:
  Function:
    Timeout: 30
    Runtime: nodejs20.x
    Architectures:
      - arm64
    MemorySize: 256
    # Enable X-Ray tracing for debugging (optional, within free tier)
    Tracing: PassThrough

# Parameters for deployment configuration
Parameters:
  TelegramBotToken:
    Type: String
    Description: Telegram Bot API token from BotFather
    NoEcho: true
  
  OpenAIApiKey:
    Type: String
    Description: OpenAI API key for GPT summarization
    NoEcho: true
    Default: ''
  
  LLMProvider:
    Type: String
    Description: AI provider to use for summarization
    Default: gemini
    AllowedValues:
      - openai
      - bedrock
      - gemini
  
  GeminiApiKey:
    Type: String
    Description: Google Gemini API key for summarization
    NoEcho: true
    Default: ''

  LLMModel:
    Type: String
    Description: Model name override for the selected AI provider (empty uses provider default)
    Default: 'gemini-3.1-flash-lite-preview'

  MessageTTLHours:
    Type: Number
    Description: Hours to retain messages before automatic deletion
    Default: 72
    MinValue: 1
    MaxValue: 168
  
  DefaultSummaryHours:
    Type: Number
    Description: Default time window for summary command (hours)
    Default: 24
    MinValue: 1
    MaxValue: 72
  
  AdminUserId:
    Type: Number
    Description: Telegram user ID of the bot admin (for /admin commands)
    Default: 0

  DefaultDailyCredits:
    Type: Number
    Description: Default daily summary credits for free users
    Default: 2
    MinValue: 1
    MaxValue: 1000

  LogRetentionDays:
    Type: Number
    Description: CloudWatch log retention period in days
    Default: 7
    AllowedValues:
      - 1
      - 3
      - 5
      - 7
      - 14
      - 30

Resources:
  # Lambda function for processing Telegram webhooks
  # Validates: Requirements 9.1 - Use serverless compute (AWS Lambda)
  TelegramBotFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub '${AWS::StackName}-webhook-handler'
      Description: Processes Telegram webhook updates for the Summary Bot
      # Handler points to the bundled output in dist folder
      # Run 'npm run bundle:prod' before 'sam build' to generate the bundle
      Handler: handler.handler
      CodeUri: dist/
      Environment:
        Variables:
          DYNAMODB_TABLE: !Ref MessagesTable
          # DYNAMODB_ENDPOINT is empty in production (uses AWS DynamoDB)
          # Override via env.local.json for local testing with DynamoDB Local
          DYNAMODB_ENDPOINT: ''
          LLM_PROVIDER: !Ref LLMProvider
          TELEGRAM_BOT_TOKEN: !Ref TelegramBotToken
          OPENAI_API_KEY: !Ref OpenAIApiKey
          GEMINI_API_KEY: !Ref GeminiApiKey
          LLM_MODEL: !Ref LLMModel
          MESSAGE_TTL_HOURS: !Ref MessageTTLHours
          DEFAULT_SUMMARY_HOURS: !Ref DefaultSummaryHours
          CREDITS_TABLE: !Ref UserCreditsTable
          CHAT_OWNERSHIP_TABLE: !Ref ChatOwnershipTable
          ADMIN_USER_ID: !Ref AdminUserId
          DEFAULT_DAILY_CREDITS: !Ref DefaultDailyCredits
          TOPIC_LINKS_TABLE: !Ref TopicLinksTable
          USER_GROUPS_TABLE: !Ref UserGroupMembershipTable
      # IAM policies with least privilege
      # Validates: Requirements 7.2 - Use IAM roles with least-privilege permissions
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref MessagesTable
        - DynamoDBCrudPolicy:
            TableName: !Ref UserCreditsTable
        - DynamoDBCrudPolicy:
            TableName: !Ref ChatOwnershipTable
        - DynamoDBCrudPolicy:
            TableName: !Ref TopicLinksTable
        - DynamoDBCrudPolicy:
            TableName: !Ref UserGroupMembershipTable
        # Bedrock policy (only needed if using Bedrock provider)
        - Version: '2012-10-17'
          Statement:
            - Effect: Allow
              Action:
                - bedrock:InvokeModel
              Resource:
                - !Sub 'arn:aws:bedrock:${AWS::Region}::foundation-model/*'
      # HTTP API Gateway event trigger
      # Validates: Requirements 9.3 - Use API Gateway for webhook handling
      Events:
        Webhook:
          Type: HttpApi
          Properties:
            Path: /webhook
            Method: POST
            ApiId: !Ref TelegramBotApi

  # HTTP API Gateway for webhook endpoint
  # Validates: Requirements 9.3 - Use API Gateway (HTTP API is 70% cheaper than REST API)
  TelegramBotApi:
    Type: AWS::Serverless::HttpApi
    Properties:
      StageName: prod
      Description: HTTP API for Telegram Bot webhook
      CorsConfiguration:
        AllowOrigins:
          - '*'
        AllowMethods:
          - POST
        AllowHeaders:
          - Content-Type

  # DynamoDB table for message storage
  # Validates: Requirements 9.2 - Use DynamoDB with TTL to minimize storage costs
  MessagesTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: !Sub '${AWS::StackName}-messages'
      # On-demand capacity for cost efficiency with low traffic
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: chatId
          AttributeType: N
        - AttributeName: timestamp
          AttributeType: N
      KeySchema:
        - AttributeName: chatId
          KeyType: HASH
        - AttributeName: timestamp
          KeyType: RANGE
      # TTL for automatic message cleanup
      # Validates: Requirements 2.3, 2.4 - TTL auto-cleanup
      TimeToLiveSpecification:
        AttributeName: expireAt
        Enabled: true
      # Point-in-time recovery disabled to stay within free tier
      PointInTimeRecoverySpecification:
        PointInTimeRecoveryEnabled: false
      # Server-side encryption (enabled by default, no additional cost)
      SSESpecification:
        SSEEnabled: true
      Tags:
        - Key: Application
          Value: TelegramSummaryBot
        - Key: Environment
          Value: !Ref AWS::StackName

  # DynamoDB table for user credits tracking
  UserCreditsTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: !Sub '${AWS::StackName}-user-credits'
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: userId
          AttributeType: N
      KeySchema:
        - AttributeName: userId
          KeyType: HASH
      PointInTimeRecoverySpecification:
        PointInTimeRecoveryEnabled: false
      SSESpecification:
        SSEEnabled: true
      Tags:
        - Key: Application
          Value: TelegramSummaryBot
        - Key: Environment
          Value: !Ref AWS::StackName

  # DynamoDB table for chat-to-owner mapping
  ChatOwnershipTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: !Sub '${AWS::StackName}-chat-ownership'
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: chatId
          AttributeType: N
      KeySchema:
        - AttributeName: chatId
          KeyType: HASH
      PointInTimeRecoverySpecification:
        PointInTimeRecoveryEnabled: false
      SSESpecification:
        SSEEnabled: true
      Tags:
        - Key: Application
          Value: TelegramSummaryBot
        - Key: Environment
          Value: !Ref AWS::StackName

  # DynamoDB table for topic-to-group link mappings (private topics feature)
  TopicLinksTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: !Sub '${AWS::StackName}-topic-links'
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: userId
          AttributeType: N
        - AttributeName: topicThreadId
          AttributeType: N
        - AttributeName: groupChatId
          AttributeType: N
      KeySchema:
        - AttributeName: userId
          KeyType: HASH
        - AttributeName: topicThreadId
          KeyType: RANGE
      GlobalSecondaryIndexes:
        - IndexName: GroupChatIndex
          KeySchema:
            - AttributeName: groupChatId
              KeyType: HASH
            - AttributeName: userId
              KeyType: RANGE
          Projection:
            ProjectionType: ALL
      PointInTimeRecoverySpecification:
        PointInTimeRecoveryEnabled: false
      SSESpecification:
        SSEEnabled: true
      Tags:
        - Key: Application
          Value: TelegramSummaryBot
        - Key: Environment
          Value: !Ref AWS::StackName

  # DynamoDB table for tracking user-group membership (private topics feature)
  UserGroupMembershipTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: !Sub '${AWS::StackName}-user-groups'
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: userId
          AttributeType: N
        - AttributeName: groupChatId
          AttributeType: N
      KeySchema:
        - AttributeName: userId
          KeyType: HASH
        - AttributeName: groupChatId
          KeyType: RANGE
      PointInTimeRecoverySpecification:
        PointInTimeRecoveryEnabled: false
      SSESpecification:
        SSEEnabled: true
      Tags:
        - Key: Application
          Value: TelegramSummaryBot
        - Key: Environment
          Value: !Ref AWS::StackName

  # CloudWatch Log Group with retention policy
  # Validates: Cost Optimization - Set log retention to 7 days
  TelegramBotFunctionLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: !Sub '/aws/lambda/${TelegramBotFunction}'
      RetentionInDays: !Ref LogRetentionDays
      Tags:
        - Key: Application
          Value: TelegramSummaryBot

# Stack outputs for deployment information
Outputs:
  WebhookUrl:
    Description: Webhook URL to register with Telegram BotFather
    Value: !Sub 'https://${TelegramBotApi}.execute-api.${AWS::Region}.amazonaws.com/prod/webhook'
  
  FunctionArn:
    Description: Lambda function ARN
    Value: !GetAtt TelegramBotFunction.Arn
  
  FunctionName:
    Description: Lambda function name
    Value: !Ref TelegramBotFunction
  
  MessagesTableName:
    Description: DynamoDB table name for messages
    Value: !Ref MessagesTable
  
  MessagesTableArn:
    Description: DynamoDB table ARN
    Value: !GetAtt MessagesTable.Arn
  
  UserCreditsTableName:
    Description: DynamoDB table name for user credits
    Value: !Ref UserCreditsTable

  ChatOwnershipTableName:
    Description: DynamoDB table name for chat ownership
    Value: !Ref ChatOwnershipTable

  TopicLinksTableName:
    Description: DynamoDB table name for topic-to-group link mappings
    Value: !Ref TopicLinksTable

  UserGroupMembershipTableName:
    Description: DynamoDB table name for user-group membership tracking
    Value: !Ref UserGroupMembershipTable

  ApiEndpoint:
    Description: HTTP API endpoint URL
    Value: !Sub 'https://${TelegramBotApi}.execute-api.${AWS::Region}.amazonaws.com/prod'
